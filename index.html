<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Wedding</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Serif+JP:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="petals"></div>

    <div class="card">

        <h1 class="title">
            <span class="pulse-heart">💛</span>
            Happy Wedding
            <span class="pulse-heart">💛</span>
        </h1>

        <h2>
            <span class="blue">かずき兄ちゃん</span><br>
            & <br>
            <span class="red">あんじゅ姉ちゃん</span>
        </h2>

        <p class="quote">
            "May your love grow forever."
        </p>

        <div class="photo-area">
            <button id="heart">💖</button>
            <p>With love and happiness</p>
        </div>

        <div class="line"></div>

        <h3>Message</h3>

        <p class="message">
            ご結婚おめでとうございます。<br><br>

            お二人のこれからの日々が、<br>
            笑顔と幸せにあふれますように。<br><br>

            お互いを大切にしながら、<br>
            お二人らしい素敵な家庭を築いてください。<br><br>

            末永くお幸せに。<br><br>
        </p>
        <div class="signature">
            － ゆうきより －
        </div>

        <div class="line"></div>

        <div class="date">
            💍 Wedding Date<br>
            2026.9.14

        </div>

        <div class="footer">
            ♡ Congratulations ♡
        </div>

    </div>

    <div id="celebration">

        <div id="confetti-container"></div>
        <div id="sparkles"></div>

        <div class="confetti left">🎉</div>

        <div class="celebration-message">
            おめでとうございます
        </div>

        <div class="confetti right">🎉</div>

    </div>

    <script src="script.js"></script>



</body>

</html>
